<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>HEIMEK CRM</title>
<!-- Бібліотеки -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root {
  --p: #14304e; --p2: #2563eb; --a: #60a5fa;
  --bg: #f3f5fa; --surface: #ffffff; --line: #e6eaf2; --line2: #eef1f7;
  --muted: #64748b; --muted2: #94a3b8;
  --success: #16a34a; --danger: #dc2626; --warning: #ea580c; --violet: #7c3aed;
  --txt: #0f172a; --radius: 16px;
  --sh: 0 2px 10px rgba(15,23,42,.06);
  --sh-lg: 0 16px 40px -12px rgba(15,23,42,.22);
  --nav-h: 54px; --side-w: 232px;
}
[data-co="luxwin"] { --p: #0d2e1c; --p2: #059669; --a: #34d399; }

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; padding-bottom: 74px; font-size: 13px; -webkit-font-smoothing: antialiased; }

/* Header */
header { background: linear-gradient(120deg, var(--p), var(--p2)); color: #fff; padding: 0 16px; height: var(--nav-h); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 14px rgba(0,0,0,.1); }
.btns { display: flex; background: rgba(0,0,0,.22); padding: 3px; border-radius: 9px; }
.btn-c { border: none; background: none; color: #fff; opacity: .6; padding: 5px 11px; cursor: pointer; font-weight: 700; font-size: .66rem; border-radius: 6px; transition: .2s; }
.btn-c.on { opacity: 1; background: rgba(255,255,255,0.22); }
#logoutBtn { background: rgba(255,255,255,0.15); border: none; color: white; padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }

/* Pipeline Nav */
.nav-s { display: flex; gap: 7px; overflow-x: auto; padding: 9px 14px; background: #fff; border-bottom: 1px solid var(--line); position: sticky; top: var(--nav-h); z-index: 900; scrollbar-width: none; }
.s-t { padding: 7px 13px; border-radius: 20px; background: #f2f4f9; font-size: .7rem; font-weight: 700; color: var(--muted); white-space: nowrap; border: 1px solid var(--line); cursor: pointer; transition: 0.15s; }
.s-t.active { background: var(--p2); color: #fff; border-color: var(--p2); box-shadow: 0 5px 14px -4px rgba(37,99,235,0.4); }

.container { padding: 14px; max-width: 1200px; margin: 0 auto; }
.panel { display: none; } .panel.on { display: block; }
#list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }

/* Картка */
.card { 
  background: var(--surface); border-radius: var(--radius); padding: 14px; box-shadow: var(--sh); 
  border: 1px solid var(--line); position: relative; overflow: hidden; border-left: 5px solid var(--p2);
  display: flex; flex-direction: column; justify-content: space-between; transition: 0.2s; cursor: pointer;
}
.card:active { transform: scale(0.98); }
.card.st-done { border-left-color: var(--success); background: #f0fff4; }
.card.st-cancelled { border-left-color: var(--danger); background: #fff5f5; opacity: 0.8; }
.card.st-inwork { border-left-color: #ed8936; background: #fffaf0; }
.card.st-storage { border-left-color: var(--violet); background: #f8f5ff; }

/* Auth Screen */
#authScreen { position: fixed; inset: 0; background: #0f172a; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
.auth-box { background: white; padding: 40px 30px; border-radius: 24px; width: 100%; max-width: 360px; text-align: center; box-shadow: var(--sh-lg); }

/* Bottom Nav */
.bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,.98); backdrop-filter: blur(10px); display: flex; border-top: 1px solid #ddd; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
.n-i { flex: 1; padding: 10px 5px; border: none; background: none; text-align: center; color: var(--muted2); font-size: .65rem; font-weight: 700; cursor: pointer; }
.n-i.active { color: var(--p2); }
.n-i i { display: block; font-size: 1.3rem; margin-bottom: 3px; }

/* Modals */
.modal-w { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 2000; display: none; align-items: flex-end; justify-content: center; }
.mbox { background: #fff; width: 100%; max-width: 600px; border-radius: 22px 22px 0 0; padding: 25px; max-height: 95vh; overflow-y: auto; }
.mbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; } /* Дві колонки */
.fg { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
.fg-full { grid-column: 1 / -1; }
label { font-size: .65rem; font-weight: 800; color: var(--muted); text-transform: uppercase; }
input, select, textarea { padding: 12px; border: 1px solid var(--line); border-radius: 12px; font-size: 1rem; background: #f8fafc; width: 100%; font-family: inherit; }

.fab { position: fixed; right: 20px; bottom: 85px; width: 56px; height: 56px; border-radius: 50%; background: var(--p2); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; border: none; box-shadow: 0 8px 20px rgba(37,99,235,0.4); z-index: 1000; cursor: pointer; }
.btn-s { background: var(--p2); color: #fff; width: 100%; padding: 15px; border: none; border-radius: 15px; font-weight: 900; font-size: 1rem; cursor: pointer; }

#loader { position: fixed; inset: 0; background: #fff; z-index: 5000; display: flex; justify-content: center; align-items: center; }

@media (max-width: 600px) {
  .mbox-grid { grid-template-columns: 1fr; }
}

@media (min-width: 900px) {
  body { padding-left: var(--side-w); }
  .bottom-nav { top: 0; left: 0; width: var(--side-w); height: 100vh; flex-direction: column; padding: 30px 15px; border-right: 1px solid var(--line); border-top: none; background: white; }
  .n-i { flex: none; text-align: left; padding: 14px; font-size: .9rem; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
  .n-i i { margin: 0; font-size: 1.1rem; width: 24px; }
  .n-i.active { background: #eef2ff; }
  header { padding-left: 20px; }
  .nav-s { top: 0; padding-left: 20px; }
}
</style>
</head>
<body data-co="heimek">

<div id="loader"><i class="fa fa-spinner fa-spin fa-2x" style="color:var(--p2)"></i></div>

<!-- ЕКРАН ВХОДУ -->
<div id="authScreen" style="display:none">
  <div class="auth-box">
    <h2 style="margin-bottom:20px; font-weight:900;">HEIMEK CRM</h2>
    <div class="fg"><label>Email</label><input id="email" type="email" placeholder="mail@example.com"></div>
    <div class="fg"><label>Пароль</label><input id="password" type="password" placeholder="••••••"></div>
    <button class="btn-s" onclick="doLogin()">УВІЙТИ</button>
  </div>
</div>

<header>
  <div style="font-weight:900; letter-spacing: -0.5px;" id="brd">HEIMEK CRM</div>
  <div style="display:flex; align-items:center; gap:10px;">
    <div class="btns">
      <button class="btn-c on" id="b-hmk" onclick="setCo('heimek')">HMK</button>
      <button class="btn-c" id="b-lux" onclick="setCo('luxwin')">LUX</button>
    </div>
    <button id="logoutBtn" onclick="doLogout()"><i class="fa fa-power-off"></i></button>
  </div>
</header>

<div class="nav-s" id="navS">
  <div class="s-t active" data-s="Усі" onclick="flt('Усі',this)">Усі</div>
  <div class="s-t" data-s="Боржники" onclick="flt('Боржники',this)">💸 Боржники</div>
  <div class="s-t" data-s="Кошторис" onclick="flt('Кошторис',this)">📑 Кошторис</div>
  <div class="s-t" data-s="Підтверджено" onclick="flt('Підтверджено',this)">✅ Підтверджено</div>
  <div class="s-t" data-s="Перевірка" onclick="flt('Перевірка',this)">🔍 Перевірка</div>
  <div class="s-t" data-s="В роботі" onclick="flt('В роботі',this)">🏭 В роботі</div>
  <div class="s-t" data-s="На складі" onclick="flt('На складі',this)">🚚 На складі</div>
  <div class="s-t" data-s="Виконано" onclick="flt('Виконано',this)">📦 Виконано</div>
</div>

<div class="container" id="mainUI">
  <div id="p-orders" class="panel on">
    <div style="display:flex; gap:10px; margin-bottom:15px;">
      <input type="text" id="q" placeholder="🔍 Пошук замовлення..." oninput="render()" style="flex:1">
      <select id="sortSel" onchange="render()" style="width:auto; font-size:0.7rem;">
        <option value="status">⇅ Статус</option>
        <option value="deadline">⇅ Дедлайн</option>
        <option value="new">⇅ Нові</option>
      </select>
    </div>
    <div id="list"></div>
  </div>
  <div id="p-clients" class="panel"><div id="listC"></div></div>
  <div id="p-stats" class="panel"><div id="statsDisplay"></div></div>
</div>

<div class="bottom-nav">
  <button class="n-i active" id="ni-orders" onclick="tab('orders')"><i class="fa fa-list-ul"></i><span>Замовлення</span></button>
  <button class="n-i" id="ni-clients" onclick="tab('clients')"><i class="fa fa-users"></i><span>Клієнти</span></button>
  <button class="n-i" id="ni-stats" onclick="tab('stats')"><i class="fa fa-chart-line"></i><span>Звіт</span></button>
</div>

<button class="fab" onclick="fab()"><i class="fa fa-plus"></i></button>

<!-- МОДАЛКА ЗАМОВЛЕННЯ (2 КОЛОНКИ) -->
<div id="mO" class="modal-w">
  <div class="mbox">
    <div style="display:flex;justify-content:space-between;margin-bottom:15px;"><h3>Замовлення</h3><i class="fa fa-times" onclick="closeM('mO')"></i></div>
    <div class="mbox-grid">
      <div class="fg fg-full"><label>Клієнт</label><input id="fCl" list="dlC"><datalist id="dlC"></datalist></div>
      <div class="fg"><label>Виріб</label><input id="fPr"></div>
      <div class="fg"><label>Фабрика</label><select id="fFa"><option>Eko-okna</option><option>Seharia</option><option>Ukraine</option></select></div>
      <div class="fg"><label>Статус</label><select id="fSt" onchange="tglCan()"><option>Кошторис</option><option>Підтверджено</option><option>Перевірка</option><option>В роботі</option><option>На складі</option><option>Виконано</option><option>Скасовано</option></select></div>
      <div class="fg"><label>Дедлайн</label><input id="fDl" type="date"></div>
      <div id="canB" class="fg fg-full" style="display:none"><label style="color:red">Причина скасування</label><textarea id="fCan"></textarea></div>
      <div class="fg"><label>Ціна HT €</label><input id="fSa" type="number" oninput="calc()"></div>
      <div class="fg"><label>Націнка %</label><input id="fMarkup" readonly style="background:#eef2ff; font-weight:bold; color:var(--p2)"></div>
      <div class="fg"><label>TVA %</label><select id="fTv" onchange="calc()"></select></div>
      <div class="fg"><label>Сума TTC €</label><input id="fTt" readonly style="background:#fefce8;font-weight:bold"></div>
      <div class="fg"><label>Ціна Фабрики €</label><input id="fCo" type="number" oninput="calc()"></div>
      <div class="fg"><label>Передплата ФАБРИЦІ €</label><input id="fFaPa" type="number"></div>
      <div class="fg"><label>Передплата КЛІЄНТА €</label><input id="fPa" type="number"></div>
      <div class="fg"><label>Монтаж € (Прибуток)</label><input id="fIn" type="number" oninput="calc()"></div>
      <div class="fg fg-full"><label>Чистий прибуток</label><input id="fMr" readonly style="background:#f0fdf4;font-weight:bold;color:#166534"></div>
      <div class="fg fg-full"><label>Етапи</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:0.75rem">
          <label><input type="checkbox" id="fChM"> 📐 Замір</label><label><input type="checkbox" id="fChO"> 🏭 Завод</label>
          <label><input type="checkbox" id="fChS"> 🚚 Склад</label><label><input type="checkbox" id="fChI"> 🏠 Монтаж</label>
        </div>
      </div>
      <div class="fg fg-full"><label>Нотатки</label><textarea id="fNo" rows="2"></textarea></div>
    </div>
    <button class="btn-s" onclick="saveOrderFinal()">ЗБЕРЕГТИ</button>
    <button id="btnD" onclick="delO()" style="color:red;border:none;background:none;width:100%;margin-top:10px;font-weight:bold;cursor:pointer;display:none">Видалити</button>
  </div>
</div>

<div id="mC" class="modal-w">
  <div class="mbox">
    <div style="display:flex;justify-content:space-between;margin-bottom:15px;"><h3>Клієнт</h3><i class="fa fa-times" onclick="closeM('mC')"></i></div>
    <div class="mbox-grid">
      <div class="fg fg-full"><label>ПІБ / Компанія</label><input id="cNa"></div>
      <div class="fg"><label>Телефон</label><input id="cPh" type="tel"></div>
      <div class="fg"><label>Адреса</label><input id="cAd"></div>
      <div class="fg fg-full"><label>Нотатки</label><textarea id="cNo"></textarea></div>
    </div>
    <div id="hSec" style="margin-top:15px; border-top:1px solid #eee; padding-top:10px; display:none;"><label>Історія:</label><div id="hList"></div></div>
    <button class="btn-s" onclick="saveClientFinal()">ЗБЕРЕГТИ КЛІЄНТА</button>
    <button id="btnDC" onclick="delC()" style="color:red;border:none;background:none;width:100%;margin-top:10px;font-weight:bold;display:none">Видалити</button>
  </div>
</div>

<script>
const URL_SB = "https://ysctdrsxqtekxuvkjmdx.supabase.co";
const KEY_SB = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzY3RkcnN4cXRla3h1dmtqbWR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1ODkxOTksImV4cCI6MjA5OTE2NTE5OX0.vmOKBfc1dGLgrNu1YQ9IVF-v6nUGb2tzEK29L1X0aiQ";
const sb = window.supabase.createClient(URL_SB, KEY_SB);

let co='heimek', orders=[], clients=[], editId=null, curT='orders', curS='Усі';
const TVA_OPTS = { heimek: [0, 5.5, 20], luxwin: [0, 6, 21] };
const n = v => parseFloat(v) || 0;

async function checkUser() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    const { data: prof } = await sb.from('profiles').select('company').eq('id', session.user.id).single();
    co = prof ? prof.company : 'heimek';
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('mainUI').style.display = 'block';
    document.getElementById('bottomNav').style.display = 'flex';
    document.getElementById('logoutBtn').style.display = 'block';
    setCo(co);
  } else {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('authScreen').style.display = 'flex';
  }
}

async function doLogin() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) alert(error.message); else checkUser();
}
async function doLogout() { await sb.auth.signOut(); location.reload(); }

async function sync() {
  document.getElementById('loader').style.display = 'flex';
  const { data: oData } = await sb.from('orders').select('*').eq('company', co).order('created_at', { ascending: false });
  orders = oData || [];
  const { data: cData } = await sb.from('clients').select('*').eq('company', co);
  clients = cData || [];
  updateDl(); render(); if(curT==='stats') renderStats();
  document.getElementById('loader').style.display = 'none';
}

const render = () => {
  const q=document.getElementById('q').value.toLowerCase();
  const sort=document.getElementById('sortSel').value;
  const list=document.getElementById('list'); const today=new Date().toISOString().split('T')[0];
  let f = orders.filter(o=>( (o.client||"") + (o.product||"") + (o.factory||"") ).toLowerCase().includes(q));
  if (curS === 'Боржники') f = f.filter(o => (n(o.total_ttc) - n(o.paid_amount)) > 1 && o.status !== 'Виконано' && o.status !== 'Скасовано');
  else if(curS!=='Усі') f = f.filter(o => o.status === curS);
  
  if(sort === 'deadline') f.sort((a,b) => (a.deadline || '9999').localeCompare(b.deadline || '9999'));
  else if(sort === 'new') f.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  else if(sort === 'price') f.sort((a,b) => n(b.total_ttc) - n(a.total_ttc));

  list.innerHTML = f.map(o=>{
    const ttc = n(o.total_ttc), paid = n(o.paid_amount), debt = ttc - paid;
    const over = o.deadline && o.deadline < today && o.status !== 'Виконано' && o.status !== 'Скасовано';
    const cl = clients.find(x=>x.name===o.client)||{};
    let stCl = o.status === 'Виконано' ? 'st-done' : o.status === 'Скасовано' ? 'st-cancelled' : o.status === 'В роботі' ? 'st-inwork' : o.status === 'На складі' ? 'st-storage' : o.status === 'Перевірка' ? 'st-verify' : '';
    let pLink = (cl.phone||"").startsWith('0') ? `+${co==='heimek'?'33':'32'}${cl.phone.substring(1)}` : cl.phone;

    return `<div class="card ${over?'over':''} ${stCl}" onclick="openO('${o.id}')">
        <div class="c-row-1"><div class="c-name">${o.client||'Без імені'}</div><div class="status-badge">${o.status}</div></div>
        <div class="c-row-2">${o.factory} | ${o.product||'---'}</div>
        <div class="c-steps-inline">
          <i class="fa fa-ruler-combined ${o.check_measured?'active':''}"></i>
          <i class="fa fa-file-signature ${o.check_ordered?'active':''}"></i>
          <i class="fa fa-warehouse ${o.check_storage?'active':''}"></i>
          <i class="fa fa-tools ${o.check_installed?'active':''}"></i>
        </div>
        <div class="c-foot">
          <div class="val">${n(ttc).toFixed(0)} €</div>
          <div style="display:flex; align-items:center; gap:8px;">
            <a href="tel:${pLink}" onclick="event.stopPropagation()"><i class="fa fa-phone-alt" style="color:var(--success)"></i></a>
            <a href="https://wa.me/${(pLink||'').replace('+','')}" onclick="event.stopPropagation()"><i class="fab fa-whatsapp" style="color:#25d366"></i></a>
            <div class="debt-tag ${debt > 1 ? 'red' : 'green'}">${debt > 1 ? debt.toFixed(0)+'€' : 'OK'}</div>
          </div>
        </div>
      </div>`}).join('');
}

function openO(id) {
  editId=id; const o=id?orders.find(x=>x.id==id):{};
  ['fCl','fPr','fSa','fCo','fIn','fPa','fDl','fRe','fNo','fCan','fFaPa'].forEach(i=>document.getElementById(i).value='');
  ['fChM','fChO','fChS','fChI'].forEach(i=>document.getElementById(i).checked=false);
  if(id){
    document.getElementById('fCl').value=o.client; document.getElementById('fPr').value=o.product;
    document.getElementById('fSa').value=o.sale_price_ht; document.getElementById('fTv').value=o.tva_rate;
    document.getElementById('fCo').value=o.cost_price; document.getElementById('fIn').value=o.install_cost;
    document.getElementById('fPa').value=o.paid_amount; document.getElementById('fDl').value=o.deadline;
    document.getElementById('fRe').value=o.reminder_date; document.getElementById('fSt').value=o.status;
    document.getElementById('fNo').value=o.notes; document.getElementById('fCan').value=o.cancel_reason;
    document.getElementById('fFaPa').value=o.factory_prepay;
    document.getElementById('fChM').checked=!!o.check_measured; document.getElementById('fChO').checked=!!o.check_ordered;
    document.getElementById('fChS').checked=!!o.check_storage; document.getElementById('fChI').checked=!!o.check_installed;
    document.getElementById('btnD').style.display='block';
  } else document.getElementById('btnD').style.display='none';
  tglCan(); calc(); document.getElementById('mO').style.display='flex';
}

function calc() {
  const h=n(document.getElementById('fSa').value), t=n(document.getElementById('fTv').value), c=n(document.getElementById('fCo').value), i=n(document.getElementById('fIn').value);
  document.getElementById('fTt').value = ((h+i)*(1+t/100)).toFixed(2);
  document.getElementById('fMr').value = ((h-c)+i).toFixed(2) + ' €';
  document.getElementById('fMarkup').value = c > 0 ? (((h - c) / c) * 100).toFixed(1) + ' %' : '0 %';
}

async function saveOrderFinal() {
  const o = { id: editId || 'NEW'+Date.now(), company: co, client: document.getElementById('fCl').value, product: document.getElementById('fPr').value, factory: document.getElementById('fFa').value, status: document.getElementById('fSt').value, sale_price_ht: n(document.getElementById('fSa').value), tva_rate: n(document.getElementById('fTv').value), total_ttc: n(document.getElementById('fTt').value), cost_price: n(document.getElementById('fCo').value), install_cost: n(document.getElementById('fIn').value), paid_amount: n(document.getElementById('fPa').value), factory_prepay: n(document.getElementById('fFaPa').value), deadline: document.getElementById('fDl').value || null, reminder_date: document.getElementById('fRe').value || null, notes: document.getElementById('fNo').value, cancel_reason: document.getElementById('fCan').value, check_measured: document.getElementById('fChM').checked, check_ordered: document.getElementById('fChO').checked, check_storage: document.getElementById('fChS').checked, check_installed: document.getElementById('fChI').checked };
  await sb.from('orders').upsert(o); closeM('mO'); sync();
}

function renderC() {
  const q=document.getElementById('qc').value.toLowerCase();
  document.getElementById('listC').innerHTML = clients.filter(c=>(c.name||'').toLowerCase().includes(q)).map(c=>`<div class="card" onclick="openCE('${c.id}')" style="border-left:none"><strong>${c.name||'Без імені'}</strong><br><small>${c.phone}</small></div>`).join('');
}
function openCE(id) { editId=id; const c=clients.find(x=>x.id==id); document.getElementById('cNa').value=c.name; document.getElementById('cPh').value=c.phone; document.getElementById('cAd').value=c.address; document.getElementById('cNo').value=c.notes; document.getElementById('btnDC').style.display='block'; document.getElementById('mC').style.display='flex'; }
async function saveC() { const c = { id: editId || 'CNEW'+Date.now(), company: co, name: document.getElementById('cNa').value, phone: document.getElementById('cPh').value, address: document.getElementById('cAd').value, notes: document.getElementById('cNo').value }; await sb.from('clients').upsert(c); closeM('mC'); sync(); }

function fab() { if(curT==='clients'){editId=null; document.getElementById('cNa').value=''; document.getElementById('mC').style.display='flex';} else openO(null); }
function closeM(id) { document.getElementById(id).style.display='none'; editId=null; }
function tab(t) { curT=t; document.querySelectorAll('.panel').forEach(p=>p.style.display='none'); document.getElementById('p-'+t).style.display='block'; document.querySelectorAll('.n-i').forEach(i=>i.classList.remove('active')); document.getElementById('ni-'+t).classList.add('active'); if(t==='clients') renderC(); if(t==='stats') renderStats(); }
function flt(s,el) { curS=s; document.querySelectorAll('.s-t').forEach(t=>t.classList.remove('active')); if(el) el.classList.add('active'); else {const target = document.querySelector(`[data-s='${s}']`); if(target) target.classList.add('active');} render(); }
function updateTva() { const sel = document.getElementById('fTv'); if(sel) sel.innerHTML = TVA_OPTS[co].map(v => `<option value="${v}">${v}%</option>`).join(''); }
function updateDl() { document.getElementById('dlC').innerHTML=clients.map(c=>`<option value="${c.name}">`).join(''); }
function tglCan() { document.getElementById('canB').style.display = document.getElementById('fSt').value === 'Скасовано' ? 'block' : 'none'; }
function setCo(k) { co=k; sync(); }
async function delO() { if(confirm('Видалити?')) { await sb.from('orders').delete().eq('id', editId); closeM('mO'); sync(); } }
async function delC() { if(confirm('Видалити?')) { await sb.from('clients').delete().eq('id', editId); closeM('mC'); sync(); } }
function renderStats() { const profit = orders.reduce((s, o) => s + (n(o.sale_price_ht)-n(o.cost_price)+n(o.install_cost)), 0); const debt = orders.reduce((s, o) => o.status==='Скасовано'?s:s+(n(o.total_ttc)-n(o.paid_amount)), 0); document.getElementById('statsDisplay').innerHTML = `<div style="background:var(--p); color:white; padding:20px; border-radius:20px; text-align:center; margin-bottom:15px;"><small>Прибуток HT</small><h2 style="margin:5px 0;">${n(profit).toFixed(0)} €</h2><small>Борг: ${n(debt).toFixed(0)} €</small></div>`; }

window.onload = checkUser;
</script>
</body>
</html>
