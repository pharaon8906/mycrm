<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>CRM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* ============ ТОКЕНИ ============ */
:root {
  /* Бренд */
  --p: #101a2c;            /* глибокий чорнильний */
  --p2: #3355ff;           /* акцент дії */
  --p2-soft: #eef1ff;
  --a: #7c92ff;

  /* База */
  --bg: #e9edf3;
  --surface: #ffffff;
  --line: #d9dfe9;
  --line-soft: #eaeef4;

  /* Текст (контраст перевірено на AA) */
  --txt: #0b1220;          /* 17:1 */
  --muted: #5a6577;        /* 6.0:1 ✓ */
  --muted2: #78839a;       /* 4.6:1 ✓ */

  /* Семантика статусів */
  --est: #7d8798;          /* Кошторис */
  --conf: #3355ff;         /* Підтверджено */
  --verify: #0e8fa8;       /* Перевірка */
  --work: #c2610a;         /* В роботі */
  --store: #6d3fd4;        /* На складі */
  --done: #12805c;         /* Виконано */
  --canc: #c0344a;         /* Скасовано */

  --success: #12805c; --danger: #c0344a; --warning: #c2610a; --violet: #6d3fd4; --cyan: #0e8fa8;

  /* Шкала радіусів */
  --r-xs: 8px; --r-sm: 10px; --r: 14px; --r-lg: 18px; --r-xl: 24px;

  /* Тіні — легкі, як у сучасних дашбордах */
  --sh-1: 0 1px 2px rgba(11,18,32,.05);
  --sh-2: 0 4px 16px -4px rgba(11,18,32,.10);
  --sh-3: 0 24px 48px -16px rgba(11,18,32,.24);

  --nav-h: 58px; --side-w: 244px;
}
[data-co="luxwin"] { --p: #0b1f18; --p2: #068a63; --p2-soft: #e9f8f2; --a: #4fc79f; --conf: #068a63; }

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg); color: var(--txt);
  font-family: 'Inter', system-ui, sans-serif;
  padding-bottom: 78px; font-size: 14px; line-height: 1.45;
  -webkit-font-smoothing: antialiased;
}
::selection { background: var(--p2); color: #fff; }

/* ============ HEADER ============ */
header {
  background: var(--p); color: #fff; padding: 0 18px; height: var(--nav-h);
  display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; z-index: 1000;
}
.brand { display: flex; align-items: center; gap: 11px; }
.brand .logo {
  width: 32px; height: 32px; border-radius: var(--r-sm);
  background: var(--p2); display: grid; place-items: center; font-size: 14px;
}
#brd { font-weight: 700; letter-spacing: -.02em; font-size: 15px; }
#logoutBtn {
  background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.14); color: #fff;
  height: 36px; padding: 0 14px; border-radius: var(--r-sm); cursor: pointer;
  display: none; align-items: center; gap: 7px; font-size: 12.5px; font-weight: 600; font-family: inherit;
  transition: .15s;
}
#logoutBtn:hover { background: rgba(255,255,255,.18); }

/* ============ ФІЛЬТРИ ============ */
.nav-s {
  display: flex; gap: 8px; overflow-x: auto; padding: 12px 16px;
  background: var(--surface); border-bottom: 1px solid var(--line);
  position: sticky; top: var(--nav-h); z-index: 900; scrollbar-width: none;
}
.nav-s::-webkit-scrollbar { display: none; }
.s-t {
  height: 36px; padding: 0 14px; display: inline-flex; align-items: center;
  border-radius: 999px; background: var(--surface); font-size: 12.5px; font-weight: 600;
  color: var(--muted); white-space: nowrap; border: 1px solid var(--line);
  cursor: pointer; transition: .14s; flex-shrink: 0;
}
.s-t:hover { border-color: var(--muted2); color: var(--txt); }
.s-t.active { background: var(--txt); color: #fff; border-color: var(--txt); }

.container { padding: 18px 16px; max-width: 1240px; margin: 0 auto; }
.panel { display: none; } .panel.on { display: block; }
#list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }

/* ============ КАРТКА ЗАМОВЛЕННЯ ============ */
.card {
  background: var(--surface); border-radius: var(--r); padding: 16px;
  border: 1px solid var(--line); box-shadow: var(--sh-1);
  position: relative; overflow: hidden;
  display: flex; flex-direction: column; cursor: pointer;
  transition: border-color .15s, box-shadow .15s, transform .15s;
}
/* Тонкий акцент статусу — єдине колірне кодування */
.card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--est); }
.card:hover { border-color: var(--muted2); box-shadow: var(--sh-2); transform: translateY(-1px); }
.card:active { transform: scale(.995); }
.card.st-done::before { background: var(--done); }
.card.st-cancelled::before { background: var(--canc); }
.card.st-inwork::before { background: var(--work); }
.card.st-verify::before { background: var(--verify); }
.card.st-storage::before { background: var(--store); }
/* Легкий відтінок статусу — щоб картки не зливались */
.card.st-done { background: #f5fdfa; }
.card.st-cancelled { background: #fdf7f8; opacity: .72; }
.card.st-inwork { background: #fffaf4; }
.card.st-verify { background: #f4fcfd; }
.card.st-storage { background: #faf8ff; }
.card.over { border-color: var(--danger); }

/* Кошторис — світло-червоний: треба передзвонити */
.card.st-est { background: #fdf4f5; }
.card.st-est::before { background: var(--canc); }

/* Нагадування настало — трохи насиченіший червоний */
.card.rem { background: #fceef0; border-color: color-mix(in srgb, var(--danger) 35%, var(--line)); }
.card.rem::before { background: var(--canc); }
.card.rem::after { content: "⏰"; position: absolute; top: 14px; right: 14px; font-size: 12px; }

.c-row-1 { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
.c-name { font-size: 15px; font-weight: 700; color: var(--txt); letter-spacing: -.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Статус — чип із крапкою, читабельний розмір */
.status-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11.5px; font-weight: 600; color: var(--muted);
  background: var(--line-soft); border-radius: 999px; padding: 4px 10px 4px 8px;
  white-space: nowrap; flex-shrink: 0; letter-spacing: 0; text-transform: none;
}
.status-badge::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--est); }
.st-done .status-badge::before { background: var(--done); }
.st-cancelled .status-badge::before { background: var(--canc); }
.st-inwork .status-badge::before { background: var(--work); }
.st-verify .status-badge::before { background: var(--verify); }
.st-storage .status-badge::before { background: var(--store); }
.st-done .status-badge { color: var(--done); background: #e8f6f1; }
.st-cancelled .status-badge { color: var(--canc); background: #fbecef; }
.st-inwork .status-badge { color: var(--work); background: #fdf1e5; }
.st-verify .status-badge { color: var(--verify); background: #e6f6f9; }
.st-storage .status-badge { color: var(--store); background: #f1ecfd; }

.c-row-2 { font-size: 12.5px; color: var(--muted); margin-top: 6px; }
.c-steps-inline { display: flex; align-items: center; gap: 14px; font-size: 13px; color: #cfd5df; margin: 14px 0; }
.c-steps-inline i { transition: color .15s; }
.c-steps-inline i.active { color: var(--p2); }
.clip {
  display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; color: var(--muted);
  font-weight: 600; background: var(--line-soft); padding: 4px 9px; border-radius: 999px; margin-left: auto;
}
.c-foot { display: flex; justify-content: space-between; align-items: center; padding-top: 14px; border-top: 1px solid var(--line-soft); }
.val { font-size: 19px; font-weight: 700; letter-spacing: -.03em; font-variant-numeric: tabular-nums; }
.c-foot a {
  width: 36px; height: 36px; border-radius: var(--r-xs); display: grid; place-items: center;
  background: var(--line-soft); color: var(--muted); transition: .14s;
}
.c-foot a:hover { background: var(--line); }
.debt-tag { font-size: 12px; font-weight: 700; padding: 5px 9px; border-radius: var(--r-xs); font-variant-numeric: tabular-nums; }
.debt-tag.red { background: #fbecef; color: var(--danger); }
.debt-tag.green { background: #e8f6f1; color: var(--success); }

/* Клієнти */
#listC { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
#listC .card strong { font-size: 14.5px; font-weight: 700; }
#listC .card small { color: var(--muted); font-size: 12.5px; }

/* ============ ВХІД ============ */
#authScreen { position: fixed; inset: 0; background: var(--p); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 24px; }
.auth-box { background: var(--surface); padding: 40px 32px; border-radius: var(--r-xl); width: 100%; max-width: 380px; text-align: center; box-shadow: var(--sh-3); }
.auth-box .a-logo { width: 52px; height: 52px; border-radius: var(--r); background: var(--p2); color: #fff; display: grid; place-items: center; font-size: 20px; margin: 0 auto 18px; }
.auth-box h2 { margin-bottom: 26px; font-weight: 700; font-size: 20px; letter-spacing: -.02em; }
.auth-box .fg { text-align: left; }

/* ============ ЗВІТ ============ */
.st-main {
  background: var(--p); color: #fff; padding: 30px 26px; border-radius: var(--r-lg);
  text-align: center; margin-bottom: 12px; position: relative; overflow: hidden;
}
.st-main::after { content: ""; position: absolute; right: -60px; top: -60px; width: 220px; height: 220px; background: radial-gradient(circle, color-mix(in srgb, var(--p2) 45%, transparent), transparent 70%); }
.st-main small { color: rgba(255,255,255,.6); font-weight: 600; letter-spacing: .08em; font-size: 11px; }
.st-main h2 { margin: 10px 0 6px; letter-spacing: -.04em; font-weight: 700; font-variant-numeric: tabular-nums; }
.st-main p { color: rgba(255,255,255,.68); font-size: 13px; }
.st-h { margin: 24px 0 12px; color: var(--muted2); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; font-weight: 700; }
.st-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.st-box { background: var(--surface); padding: 18px; border-radius: var(--r); border: 1px solid var(--line); box-shadow: var(--sh-1); cursor: pointer; transition: .15s; }
.st-box:hover { border-color: var(--muted2); }
.st-box b { display: block; font-size: 20px; font-weight: 700; letter-spacing: -.03em; font-variant-numeric: tabular-nums; }
.st-box small { display: block; color: var(--muted); font-weight: 600; font-size: 11.5px; margin-top: 4px; }
.st-box span { display: block; font-size: 12px; color: var(--muted2); margin-top: 4px; font-variant-numeric: tabular-nums; }

.cnt-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.cnt {
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--r); padding: 16px;
  cursor: pointer; display: flex; align-items: center; gap: 13px; transition: .15s; box-shadow: var(--sh-1);
}
.cnt:hover { border-color: var(--muted2); box-shadow: var(--sh-2); transform: translateY(-1px); }
.cnt .ic { width: 40px; height: 40px; border-radius: var(--r-xs); display: grid; place-items: center; font-size: 15px; color: #fff; flex-shrink: 0; }
.cnt .num { font-size: 24px; font-weight: 700; line-height: 1.1; letter-spacing: -.03em; font-variant-numeric: tabular-nums; }
.cnt .lbl { font-size: 11.5px; color: var(--muted); font-weight: 600; margin-top: 3px; }
.cnt .sum { font-size: 12.5px; color: var(--txt); font-weight: 600; margin-top: 4px; font-variant-numeric: tabular-nums; }

/* ============ НАВІГАЦІЯ ============ */
.bottom-nav {
  position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,.94); backdrop-filter: blur(14px);
  display: flex; border-top: 1px solid var(--line); z-index: 1000; padding-bottom: env(safe-area-inset-bottom);
}
.n-i { flex: 1; padding: 11px 5px; border: none; background: none; text-align: center; color: var(--muted2); font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; transition: .14s; }
.n-i.active { color: var(--p2); }
.n-i i { display: block; font-size: 18px; margin-bottom: 5px; }

/* ============ МОДАЛКИ ============ */
.modal-w { position: fixed; inset: 0; background: rgba(11,18,32,.5); backdrop-filter: blur(6px); z-index: 2000; display: none; align-items: flex-end; justify-content: center; }
.modal-w[style*="flex"] .mbox { animation: slideUp .3s cubic-bezier(.16,1,.3,1); }
@keyframes slideUp { from { transform: translateY(28px); opacity: 0; } to { transform: none; opacity: 1; } }
.mbox { background: var(--surface); width: 100%; max-width: 560px; border-radius: var(--r-xl) var(--r-xl) 0 0; padding: 26px 24px 28px; max-height: 94vh; overflow-y: auto; }
.mbox > div:first-child { margin-bottom: 22px !important; align-items: center; }
.mbox h3 { font-weight: 700; font-size: 18px; letter-spacing: -.02em; }
.mbox .fa-times { color: var(--muted2); font-size: 18px; cursor: pointer; padding: 6px; transition: .14s; }
.mbox .fa-times:hover { color: var(--txt); }

/* Секції форми */
.sec { font-size: 11px; font-weight: 700; color: var(--muted2); text-transform: uppercase; letter-spacing: .08em; margin: 22px 0 12px; padding-top: 18px; border-top: 1px solid var(--line-soft); }
.sec:first-of-type { margin-top: 4px; padding-top: 0; border-top: none; }

.fg { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: none; letter-spacing: 0; }
input, select, textarea {
  padding: 12px 13px; border: 1px solid var(--line); border-radius: var(--r-sm); font-size: 15px;
  background: var(--surface); width: 100%; font-family: inherit; color: var(--txt); transition: .14s;
}
input:hover, select:hover, textarea:hover { border-color: var(--muted2); }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--p2); box-shadow: 0 0 0 3px color-mix(in srgb, var(--p2) 14%, transparent); }
input[readonly] { background: var(--line-soft); color: var(--muted); }
select { cursor: pointer; }

/* Етапи — чекбокси як кнопки */
.steps { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.steps label {
  display: flex; align-items: center; gap: 9px; font-size: 13.5px; font-weight: 500; color: var(--txt);
  padding: 11px 12px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-sm);
  cursor: pointer; transition: .14s;
}
.steps label:hover { border-color: var(--muted2); }
.steps input[type=checkbox] { width: auto; accent-color: var(--p2); transform: scale(1.15); cursor: pointer; }

/* Файли */
.file-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
.file-chip { display: flex; align-items: center; gap: 11px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-sm); padding: 11px 12px; font-size: 13px; }
.file-chip > i.fa-paperclip { color: var(--muted2); }
.file-chip span { flex: 1; cursor: pointer; color: var(--p2); font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-chip span:hover { text-decoration: underline; }
.file-chip i.fa-trash { color: var(--muted2); cursor: pointer; font-size: 13px; padding: 4px; transition: .14s; }
.file-chip i.fa-trash:hover { color: var(--danger); }
.up-btn {
  display: flex; align-items: center; justify-content: center; gap: 9px;
  background: var(--p2-soft); color: var(--p2); border: 1px dashed color-mix(in srgb, var(--p2) 45%, transparent);
  border-radius: var(--r-sm); padding: 13px; cursor: pointer; font-size: 13.5px; font-weight: 600; transition: .14s;
}
.up-btn:hover { background: color-mix(in srgb, var(--p2) 12%, #fff); }

.fab {
  position: fixed; right: 18px; bottom: 88px; width: 56px; height: 56px; border-radius: var(--r-lg);
  background: var(--p2); color: #fff; display: flex; align-items: center; justify-content: center;
  font-size: 20px; border: none; box-shadow: var(--sh-2);
  z-index: 1000; cursor: pointer; transition: .18s;
}
.fab:hover { transform: translateY(-2px); }
.fab:active { transform: scale(.92) rotate(90deg); }
.btn-s {
  background: var(--txt); color: #fff; width: 100%; height: 50px; border: none; border-radius: var(--r-sm);
  font-weight: 600; font-size: 15px; cursor: pointer; margin-top: 8px; font-family: inherit; transition: .15s;
}
.btn-s:hover { background: var(--p2); }
#btnD, #btnDC { transition: .14s; border-radius: var(--r-sm); height: 44px; }

#loader { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; justify-content: center; align-items: center; }

/* ============ ЗЕБРА (коли список в один стовпець) ============ */
@media (max-width: 640px) {
  #list .card:nth-child(even) { background: #f3f6fa; }
  #list .card.st-done:nth-child(even) { background: #ecf9f3; }
  #list .card.st-cancelled:nth-child(even) { background: #fbf0f2; }
  #list .card.st-inwork:nth-child(even) { background: #fdf4e9; }
  #list .card.st-verify:nth-child(even) { background: #ecf7f9; }
  #list .card.st-storage:nth-child(even) { background: #f4f0fd; }
  #list .card.st-est:nth-child(even) { background: #fbeaec; }
  #list .card.rem:nth-child(even) { background: #fae2e6; }
  #listC .card:nth-child(even) { background: #f3f6fa; }
}

/* ============ ДЕСКТОП ============ */
@media (min-width: 900px) {
  body { padding-left: var(--side-w); padding-bottom: 0; }
  .bottom-nav {
    top: 0; left: 0; width: var(--side-w); height: 100vh; flex-direction: column;
    padding: 20px 12px; border-right: 1px solid var(--line); border-top: none;
    background: var(--surface); backdrop-filter: none; align-items: stretch; gap: 2px;
  }
  .n-i {
    flex: none; text-align: left; padding: 11px 12px; font-size: 13.5px; border-radius: var(--r-xs);
    display: flex; align-items: center; gap: 12px; color: var(--muted);
  }
  .n-i:hover { background: var(--line-soft); color: var(--txt); }
  .n-i i { margin: 0; font-size: 15px; width: 20px; text-align: center; }
  .n-i.active { background: var(--p2-soft); color: var(--p2); }
  .container { padding: 24px 28px 60px; }
  .cnt-grid { grid-template-columns: repeat(4, 1fr); }
  .fab { right: 28px; bottom: 28px; }

  /* Модалка по центру, у 2 колонки */
  .modal-w { align-items: center; padding: 32px; }
  .mbox { border-radius: var(--r-xl); max-width: 740px; max-height: 88vh; padding: 28px; }
  .modal-w[style*="flex"] .mbox { animation: popIn .24s cubic-bezier(.16,1,.3,1); }
  @keyframes popIn { from { transform: scale(.97); opacity: 0; } to { transform: none; opacity: 1; } }
  .grid { grid-template-columns: 1fr 1fr; }
  .steps { grid-template-columns: repeat(4, 1fr); }
}
</style>
</head>
<body>

<div id="loader"><i class="fa fa-spinner fa-spin fa-2x" style="color:var(--p2)"></i></div>

<!-- ВХІД -->
<div id="authScreen">
  <div class="auth-box">
    <div class="a-logo"><i class="fa fa-cubes"></i></div>
    <h2>CRM</h2>
    <div class="fg"><label>Email</label><input id="email" type="email" placeholder="mail@example.com"></div>
    <div class="fg"><label>Пароль</label><input id="password" type="password" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn-s" onclick="doLogin()">Увійти</button>
  </div>
</div>

<header>
  <div class="brand">
    <span class="logo"><i class="fa fa-cubes"></i></span>
    <div id="brd">CRM</div>
  </div>
  <button id="logoutBtn" onclick="doLogout()"><i class="fa fa-sign-out-alt"></i> Вихід</button>
</header>

<div class="nav-s" id="navS" style="display:none">
  <div class="s-t active" data-s="Усі" onclick="flt('Усі',this)">Усі</div>
  <div class="s-t" data-s="Боржники" onclick="flt('Боржники',this)">💸 Боржники</div>
  <div class="s-t" data-s="Кошторис" onclick="flt('Кошторис',this)">📑 Кошторис</div>
  <div class="s-t" data-s="Підтверджено" onclick="flt('Підтверджено',this)">✅ Підтверджено</div>
  <div class="s-t" data-s="Перевірка" onclick="flt('Перевірка',this)">🔎 Перевірка</div>
  <div class="s-t" data-s="В роботі" onclick="flt('В роботі',this)">🏭 В роботі</div>

<script>
const URL_SB = "https://ysctdrsxqtekxuvkjmdx.supabase.co";
const KEY_SB = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzY3RkcnN4cXRla3h1dmtqbWR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1ODkxOTksImV4cCI6MjA5OTE2NTE5OX0.vmOKBfc1dGLgrNu1YQ9IVF-v6nUGb2tzEK29L1X0aiQ";
const _sb = window.supabase.createClient(URL_SB, KEY_SB);

const CO_NAME = { heimek: 'Heimek CRM', luxwin: 'Lux Win CRM' };
const BUCKET = 'order-files';

let co='heimek', orders=[], clients=[], editId=null, curT='orders', curS='Усі', curFiles=[];
const TVA_OPTS = { heimek: [0, 5.5, 20], luxwin: [0, 6, 21] };
const n = v => parseFloat(v) || 0;
const fN = v => n(v).toLocaleString('uk-UA');

// ---- ФАЙЛИ ----
const parseFiles = v => {
  if (!v) return [];
  try { const a = JSON.parse(v); return Array.isArray(a) ? a : []; }
  catch { return [{ name: 'Файл', url: v }]; }
};

async function uploadFiles(input) {
  const files = [...input.files];
  if (!files.length) return;
  const txt = document.getElementById('upTxt');
  const orig = txt.textContent;
  for (const f of files) {
    txt.textContent = 'Завантаження: ' + f.name;
    const safe = f.name.replace(/[^\w.\-]/g, '_');
    const path = `${co}/${editId || 'new'}/${Date.now()}_${safe}`;
    const { error } = await _sb.storage.from(BUCKET).upload(path, f);
    if (error) { alert('Помилка завантаження: ' + error.message); continue; }
    curFiles.push({ name: f.name, path });
  }
  txt.textContent = orig;
  input.value = '';
  renderFiles();
}

function renderFiles() {
  const box = document.getElementById('fList');
  if (!curFiles.length) { box.innerHTML = '<small style="color:var(--muted2)">Файлів немає</small>'; return; }
  box.innerHTML = curFiles.map((f, i) =>
    `<div class="file-chip"><i class="fa fa-paperclip"></i><span onclick="openFile(${i})">${f.name}</span><i class="fa fa-trash" onclick="rmFile(${i})"></i></div>`
  ).join('');
}

async function openFile(i) {
  const f = curFiles[i];
  if (f.url) return window.open(f.url, '_blank');
  const { data, error } = await _sb.storage.from(BUCKET).createSignedUrl(f.path, 3600);
  if (error) return alert('Помилка: ' + error.message);
  window.open(data.signedUrl, '_blank');
}

async function rmFile(i) {
  if (!confirm('Видалити файл?')) return;
  const f = curFiles[i];
  if (f.path) await _sb.storage.from(BUCKET).remove([f.path]);
  curFiles.splice(i, 1);
  renderFiles();
}

// ---- АУТЕНТИФІКАЦІЯ ----
async function checkUser() {
  const { data: { session } } = await _sb.auth.getSession();
  if (session) {
    const { data: prof } = await _sb.from('profiles').select('company').eq('id', session.user.id).single();
    co = prof ? prof.company : 'heimek';
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('mainUI').style.display = 'block';
    document.getElementById('bottomNav').style.display = 'flex';
    document.getElementById('navS').style.display = 'flex';
    document.getElementById('fabBtn').style.display = 'flex';
    document.getElementById('logoutBtn').style.display = 'flex';
    document.body.setAttribute('data-co', co);
    document.getElementById('brd').innerText = CO_NAME[co] || 'CRM';
    document.title = CO_NAME[co] || 'CRM';
    updateTva(); sync();
  } else {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('authScreen').style.display = 'flex';
  }
}

async function doLogin() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const { error } = await _sb.auth.signInWithPassword({ email, password });
  if (error) alert("Помилка: " + error.message); else checkUser();
}
async function doLogout() { await _sb.auth.signOut(); location.reload(); }

async function sync() {
  document.getElementById('loader').style.display = 'flex';
  const { data: oData } = await _sb.from('orders').select('*').eq('company', co).order('created_at', { ascending: false });
  orders = oData || [];
  const { data: cData } = await _sb.from('clients').select('*').eq('company', co);
  clients = cData || [];
  updateDl(); render(); if(curT==='stats') renderStats();
  document.getElementById('loader').style.display = 'none';
}

const render = () => {
  const q=document.getElementById('q').value.toLowerCase();
  const sort=document.getElementById('sortSel').value;
  const list=document.getElementById('list'); const today=new Date().toISOString().split('T')[0];
  let f = orders.filter(o=>( (o.client||"") + (o.product||"") + (o.factory||"") ).toLowerCase().includes(q));
  if (curS === 'Боржники') f = f.filter(o => (n(o.total_ttc) - n(o.paid_amount)) > 1 && o.status !== 'Виконано' && o.status !== 'Скасовано');
  else if(curS!=='Усі') f = f.filter(o => o.status === curS);

  const stPriority = { 'В роботі': 1, 'На складі': 2, 'Перевірка': 3, 'Підтверджено': 4, 'Кошторис': 5, 'Виконано': 6, 'Скасовано': 7 };
  if(sort === 'status') f.sort((a,b) => (stPriority[a.status] || 99) - (stPriority[b.status] || 99));
  else if(sort === 'deadline') f.sort((a,b) => (a.deadline || '9999').localeCompare(b.deadline || '9999'));
  else if(sort === 'new') f.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  else if(sort === 'price') f.sort((a,b) => n(b.total_ttc) - n(a.total_ttc));

  list.innerHTML = f.map(o=>{
    const ttc = n(o.total_ttc), paid = n(o.paid_amount), debt = ttc - paid;
    const over = o.deadline && o.deadline < today && o.status !== 'Виконано' && o.status !== 'Скасовано';
    const rem = o.reminder_date && o.reminder_date <= today && o.status !== 'Виконано' && o.status !== 'Скасовано';
    const cl = clients.find(x=>x.name===o.client)||{};
    const nFiles = parseFiles(o.file_url).length;
    let stCl = o.status === 'Виконано' ? 'st-done' : o.status === 'Скасовано' ? 'st-cancelled' : o.status === 'В роботі' ? 'st-inwork' : o.status === 'На складі' ? 'st-storage' : o.status === 'Перевірка' ? 'st-verify' : o.status === 'Кошторис' ? 'st-est' : '';
    let pLink = (cl.phone||"").startsWith('0') ? `+${co==='heimek'?'33':'32'}${cl.phone.substring(1)}` : cl.phone;

    return `<div class="card ${over?'over':''} ${rem?'rem':''} ${stCl}" onclick="openO('${o.id}')">
        <div class="c-row-1"><div class="c-name">${o.client||'Без імені'}</div><div class="status-badge">${o.status}</div></div>
        <div class="c-row-2">${o.factory} · ${o.product||'---'}</div>
        <div class="c-steps-inline">
          <i class="fa fa-ruler-combined ${o.check_measured?'active':''}" title="Замір"></i>
          <i class="fa fa-file-signature ${o.check_ordered?'active':''}" title="Завод"></i>
          <i class="fa fa-warehouse ${o.check_storage?'active':''}" title="Склад"></i>
          <i class="fa fa-tools ${o.check_installed?'active':''}" title="Монтаж"></i>
          ${nFiles ? `<span class="clip"><i class="fa fa-paperclip"></i>${nFiles}</span>` : ''}
        </div>
        <div class="c-foot">
          <div class="val">${fN(ttc)} €</div>
          <div style="display:flex; align-items:center; gap:8px;">
            <a href="tel:${pLink}" onclick="event.stopPropagation()" title="Подзвонити"><i class="fa fa-phone-alt"></i></a>
            <a href="https://wa.me/${(pLink||'').replace('+','')}" onclick="event.stopPropagation()" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
            <div class="debt-tag ${debt > 1 ? 'red' : 'green'}">${debt > 1 ? fN(debt)+' €' : 'OK'}</div>
          </div>
        </div>
      </div>`}).join('');
}

function renderStats() {
  const container = document.getElementById('statsDisplay');

  const ACTIVE = ['Підтверджено','Перевірка','В роботі','На складі'];
  const done   = orders.filter(o => o.status === 'Виконано');
  const active = orders.filter(o => ACTIVE.includes(o.status));
  const sold   = orders.filter(o => ACTIVE.includes(o.status) || o.status === 'Виконано');
  const sumTTC = a => a.reduce((s,o)=> s + n(o.total_ttc), 0);

  const profit  = done.reduce((s,o)=> s + (n(o.sale_price_ht)-n(o.cost_price)+n(o.install_cost)), 0);
  const doneRev = sumTTC(done);
  const clientDebt  = sold.reduce((s,o)=> s + (n(o.total_ttc)-n(o.paid_amount)), 0);
  const factoryDebt = active.reduce((s,o)=> s + (n(o.cost_price)-n(o.factory_prepay)), 0);

  const S = [
    {k:'Виконано', ic:'fa-box', c:'var(--done)'},
    {k:'В роботі', ic:'fa-gears', c:'var(--work)'},
    {k:'Перевірка', ic:'fa-magnifying-glass', c:'var(--verify)'},
    {k:'На складі', ic:'fa-warehouse', c:'var(--store)'},
    {k:'Підтверджено', ic:'fa-circle-check', c:'var(--conf)'},
    {k:'Кошторис', ic:'fa-file-lines', c:'var(--est)'},
    {k:'Скасовано', ic:'fa-ban', c:'var(--canc)'}
  ];
  let cHtml = S.map(s => {
    const g = orders.filter(o=>o.status===s.k);
    return `<div class="cnt" onclick="tab('orders'); flt('${s.k}', document.querySelector('[data-s=\\'${s.k}\\']'))"><div class="ic" style="background:${s.c}"><i class="fa ${s.ic}"></i></div><div><div class="num">${g.length}</div><div class="lbl">${s.k}</div><div class="sum">${fN(sumTTC(g))} €</div></div></div>`;
  }).join('');

  let fHtml = '';
  ['Eko-okna', 'Seharia', 'Ukraine', 'Optimedia'].forEach(f => {
    const fo = active.filter(o => o.factory === f);
    const fd = fo.reduce((s, o) => s + (n(o.cost_price) - n(o.factory_prepay)), 0);
    fHtml += `<div class="st-box"><b style="font-size:15px">${f}</b><small>${fo.length} в роботі</small><span>Борг: ${fN(fd)} €</span></div>`;
  });

  container.innerHTML = `
    <div class="st-main">
      <small>ЧИСТИЙ ПРИБУТОК · ГОТОВО</small>
      <h2 style="font-size:38px">${fN(profit)} €</h2>
      <p>Виконано: ${done.length} замовл. · Обіг ${fN(doneRev)} €</p>
    </div>
    <div class="st-grid">
      <div class="st-box"><b style="color:var(--danger)">${fN(clientDebt)} €</b><small>Борг клієнтів</small></div>
      <div class="st-box"><b style="color:var(--warning)">${fN(factoryDebt)} €</b><small>Борг фабрикам (в роботі)</small></div>
    </div>
    <h4 class="st-h">Замовлення за статусами</h4>
    <div class="cnt-grid">${cHtml}</div>
    <h4 class="st-h">Борг по фабриках (в роботі)</h4>
    <div class="st-grid">${fHtml}</div>`;
}

async function saveO() {
  const o = { id: editId || 'NEW'+Date.now(), company: co, client: document.getElementById('fCl').value, product: document.getElementById('fPr').value, factory: document.getElementById('fFa').value, status: document.getElementById('fSt').value, sale_price_ht: n(document.getElementById('fSa').value), tva_rate: n(document.getElementById('fTv').value), total_ttc: n(document.getElementById('fTt').value), cost_price: n(document.getElementById('fCo').value), install_cost: n(document.getElementById('fIn').value), paid_amount: n(document.getElementById('fPa').value), factory_prepay: n(document.getElementById('fFaPa').value), deadline: document.getElementById('fDl').value || null, reminder_date: document.getElementById('fRe').value || null, notes: document.getElementById('fNo').value, cancel_reason: document.getElementById('fCan').value, file_url: JSON.stringify(curFiles), check_measured: document.getElementById('fChM').checked, check_ordered: document.getElementById('fChO').checked, check_storage: document.getElementById('fChS').checked, check_installed: document.getElementById('fChI').checked };
  await _sb.from('orders').upsert(o); closeM('mO'); sync();
}
async function saveC() { const c = { id: editId || 'CNEW'+Date.now(), company: co, name: document.getElementById('cNa').value, phone: document.getElementById('cPh').value, address: document.getElementById('cAd').value, notes: document.getElementById('cNo').value }; await _sb.from('clients').upsert(c); closeM('mC'); sync(); }
const openO = id => { editId=id; const o=id?orders.find(x=>x.id==id):{}; ['fCl','fPr','fSa','fCo','fIn','fPa','fDl','fRe','fNo','fCan','fFaPa'].forEach(i=>document.getElementById(i).value=''); ['fChM','fChO','fChS','fChI'].forEach(i=>document.getElementById(i).checked=false); curFiles = id ? parseFiles(o.file_url) : []; renderFiles(); if(id){ document.getElementById('fCl').value=o.client; document.getElementById('fPr').value=o.product; document.getElementById('fSa').value=o.sale_price_ht; document.getElementById('fTv').value=o.tva_rate; document.getElementById('fCo').value=o.cost_price; document.getElementById('fIn').value=o.install_cost; document.getElementById('fPa').value=o.paid_amount; document.getElementById('fDl').value=o.deadline; document.getElementById('fRe').value=o.reminder_date; document.getElementById('fSt').value=o.status; document.getElementById('fNo').value=o.notes; document.getElementById('fCan').value=o.cancel_reason; document.getElementById('fFaPa').value=o.factory_prepay; document.getElementById('fChM').checked=!!o.check_measured; document.getElementById('fChO').checked=!!o.check_ordered; document.getElementById('fChS').checked=!!o.check_storage; document.getElementById('fChI').checked=!!o.check_installed; document.getElementById('btnD').style.display='block'; } else document.getElementById('btnD').style.display='none'; tglCan(); calc(); document.getElementById('mO').style.display='flex'; }
const fab = () => curT === 'clients' ? (editId=null, ['cNa','cPh','cAd','cNo'].forEach(i=>document.getElementById(i).value=''), document.getElementById('hSec').style.display='none', document.getElementById('btnDC').style.display='none', document.getElementById('mC').style.display='flex') : openO(null);
const closeM = id => { document.getElementById(id).style.display='none'; editId=null; }
const tglCan = () => document.getElementById('canB').style.display = document.getElementById('fSt').value === 'Скасовано' ? 'block' : 'none';
const updateDl = () => { document.getElementById('dlC').innerHTML=clients.map(c=>`<option value="${c.name}">`).join(''); }
const flt = (s,el) => { curS=s; document.querySelectorAll('.s-t').forEach(t=>t.classList.remove('active')); if(el) el.classList.add('active'); else {const t = document.querySelector(`[data-s='${s}']`); if(t) t.classList.add('active');} render(); }
const tab = t => { curT=t; document.querySelectorAll('.panel').forEach(p=>p.style.display='none'); document.getElementById('p-'+t).style.display='block'; document.querySelectorAll('.n-i').forEach(i=>i.classList.remove('active')); document.getElementById('ni-'+t).classList.add('active'); if(t==='clients') renderC(); if(t==='stats') renderStats(); document.getElementById('navS').style.display = t === 'orders' ? 'flex' : 'none'; }
function renderC() { const q=document.getElementById('qc').value.toLowerCase(); document.getElementById('listC').innerHTML = clients.filter(c=>(c.name||'').toLowerCase().includes(q)).map(c=>`<div class="card" onclick="openCE('${c.id}')"><strong>${c.name||'Без імені'}</strong><br><small>${c.phone||'—'}</small></div>`).join(''); }
function openCE(id) { editId=id; const c=clients.find(x=>x.id==id); document.getElementById('cNa').value=c.name; document.getElementById('cPh').value=c.phone; document.getElementById('cAd').value=c.address; document.getElementById('cNo').value=c.notes; const h = orders.filter(o => o.client === c.name); document.getElementById('hSec').style.display = 'block'; document.getElementById('hList').innerHTML = h.map(o => `<div class="file-chip" onclick="event.stopPropagation(); closeM('mC'); openO('${o.id}')" style="cursor:pointer"><span>${o.product||'Замовлення'}</span><b style="font-variant-numeric:tabular-nums">${fN(o.total_ttc)} €</b></div>`).join('') || '<small style="color:var(--muted2)">Замовлень немає</small>'; document.getElementById('btnDC').style.display='block'; document.getElementById('mC').style.display='flex'; }
async function delO() { if(confirm('Видалити?')) { await _sb.from('orders').delete().eq('id', editId); closeM('mO'); sync(); } }
async function delC() { if(confirm('Видалити?')) { await _sb.from('clients').delete().eq('id', editId); closeM('mC'); sync(); } }
const calc = () => { const h=n(document.getElementById('fSa').value), t=n(document.getElementById('fTv').value), c=n(document.getElementById('fCo').value), i=n(document.getElementById('fIn').value); document.getElementById('fTt').value = ((h+i)*(1+t/100)).toFixed(2); document.getElementById('fMr').value = ((h-c)+i).toFixed(2) + ' €'; }
function updateTva() { const sel = document.getElementById('fTv'); if(sel) sel.innerHTML = TVA_OPTS[co].map(v => `<option value="${v}">${v}%</option>`).join(''); }
function openSheet() { window.open("https://supabase.com/dashboard/project/ysctdrsxqtekxuvkjmdx/editor", "_blank"); }

// Закриття модалки: клік поза вікном або Esc
document.querySelectorAll('.modal-w').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) closeM(m.id); });
});
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  document.querySelectorAll('.modal-w').forEach(m => { if (m.style.display === 'flex') closeM(m.id); });
});

window.onload = checkUser;
</script>
