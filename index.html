<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ViknaPro Elite CRM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root {
  --p: #14304e; --p2: #2563eb; --a: #60a5fa;
  --bg: #f3f5fa; --surface: #ffffff; --line: #e6eaf2; --line2: #eef1f7;
  --muted: #64748b; --muted2: #94a3b8;
  --success: #16a34a; --danger: #dc2626; --warning: #ea580c; --violet: #7c3aed; --cyan: #0891b2;
  --txt: #0f172a; --radius: 16px;
  --sh: 0 2px 10px rgba(15,23,42,.06);
  --sh-lg: 0 16px 40px -12px rgba(15,23,42,.22);
  --nav-h: 54px; --side-w: 232px;
}
[data-co="luxwin"] { --p: #0d2e1c; --p2: #059669; --a: #34d399; }

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; padding-bottom: 74px; font-size: 13px; -webkit-font-smoothing: antialiased; }

header { background: linear-gradient(120deg, var(--p), var(--p2)); color: #fff; padding: 0 16px; height: var(--nav-h); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 14px rgba(0,0,0,.1); }
#logoutBtn { background: rgba(255,255,255,0.15); border: none; color: white; padding: 6px 12px; border-radius: 8px; cursor: pointer; display: none; font-size: 0.75rem; font-weight: 700; }

.nav-s { display: flex; gap: 7px; overflow-x: auto; padding: 9px 14px; background: #fff; border-bottom: 1px solid var(--line); position: sticky; top: var(--nav-h); z-index: 900; scrollbar-width: none; }
.nav-s::-webkit-scrollbar { display: none; }
.s-t { padding: 7px 13px; border-radius: 20px; background: #f2f4f9; font-size: .7rem; font-weight: 700; color: var(--muted); white-space: nowrap; border: 1px solid var(--line); cursor: pointer; transition: 0.15s; flex-shrink: 0; }
.s-t:active { transform: scale(.95); }
.s-t.active { background: var(--p2); color: #fff; border-color: var(--p2); box-shadow: 0 5px 14px -4px rgba(37,99,235,0.4); }

.container { padding: 14px; max-width: 1200px; margin: 0 auto; }
.panel { display: none; } .panel.on { display: block; }
#list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }

/* Картки замовлень */
.card {
  background: var(--surface); border-radius: var(--radius); padding: 14px; box-shadow: var(--sh);
  border: 1px solid var(--line); position: relative; overflow: hidden; border-left: 5px solid var(--p2);
  display: flex; flex-direction: column; justify-content: space-between; transition: 0.2s; cursor: pointer;
}
.card:active { transform: scale(0.98); }
.card:hover { box-shadow: var(--sh-lg); transform: translateY(-2px); }
.card.st-done { border-left-color: var(--success); background: linear-gradient(180deg, #f1fdf5, #fff 60%); }
.card.st-cancelled { border-left-color: var(--danger); background: linear-gradient(180deg, #fef4f4, #fff 60%); opacity: 0.8; }
.card.st-inwork { border-left-color: #ed8936; background: linear-gradient(180deg, #fff9f2, #fff 60%); }
.card.st-verify { border-left-color: var(--cyan); background: linear-gradient(180deg, #ecfeff, #fff 60%); }
.card.st-storage { border-left-color: var(--violet); background: linear-gradient(180deg, #f8f5ff, #fff 60%); }
.card.over { box-shadow: 0 0 0 1.5px var(--danger), var(--sh); }
.card.rem::after { content: "⏰"; position: absolute; top: 10px; right: 12px; font-size: .75rem; animation: pulse 1.6s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

.c-row-1 { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.c-name { font-size: .95rem; font-weight: 800; color: var(--txt); letter-spacing: -.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.status-badge { font-size: .55rem; padding: 3px 9px; border-radius: 20px; background: #eef2f8; color: var(--muted); font-weight: 800; text-transform: uppercase; letter-spacing: .4px; white-space: nowrap; flex-shrink: 0; }
.st-done .status-badge { background: #dcfce7; color: var(--success); }
.st-cancelled .status-badge { background: #fee2e2; color: var(--danger); }
.st-inwork .status-badge { background: #ffedd5; color: var(--warning); }
.st-storage .status-badge { background: #ede9fe; color: var(--violet); }
.st-verify .status-badge { background: #cffafe; color: #0e7490; }
.c-row-2 { font-size: .74rem; color: var(--muted); margin: 7px 0 0; font-weight: 500; }
.c-steps-inline { display: flex; gap: 11px; font-size: .82rem; color: #cbd5e1; margin: 9px 0; }
.c-steps-inline i.active { color: var(--p2); transform: scale(1.1); }
.c-foot { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; margin-top: 2px; border-top: 1px dashed var(--line); }
.val { font-size: 1.15rem; font-weight: 900; letter-spacing: -.5px; }
.c-foot a { width: 32px; height: 32px; border-radius: 9px; display: grid; place-items: center; background: #f1f5f9; }
.debt-tag { font-size: .66rem; font-weight: 800; padding: 3px 8px; border-radius: 8px; }
.debt-tag.red { background: #fee2e2; color: var(--danger); }
.debt-tag.green { background: #dcfce7; color: var(--success); }

/* Клієнти */
#listC { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 11px; }

/* Auth Screen */
#authScreen { position: fixed; inset: 0; background: #0f172a; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
.auth-box { background: white; padding: 40px 30px; border-radius: 24px; width: 100%; max-width: 360px; text-align: center; box-shadow: var(--sh-lg); }
.auth-box h2 { margin-bottom: 25px; font-weight: 900; color: #14304e; font-size: 1.5rem; }

/* ===== Звіти ===== */
.st-main { background: linear-gradient(135deg, var(--p), var(--p2)); color: white; padding: 26px 24px; border-radius: 24px; text-align: center; margin-bottom: 16px; box-shadow: var(--sh-lg); position: relative; overflow: hidden; }
.st-main::after { content: ""; position: absolute; right: -30px; top: -30px; width: 150px; height: 150px; background: rgba(255,255,255,.08); border-radius: 50%; }
.st-main small { opacity: .82; font-weight: 700; letter-spacing: .6px; font-size: .68rem; }
.st-main h2 { margin: 6px 0 8px; letter-spacing: -1px; }
.st-main p { opacity: .9; font-size: .85rem; }
.st-h { margin: 16px 0 10px; color: var(--muted); font-size: .7rem; text-transform: uppercase; letter-spacing: .5px; font-weight: 800; }
.st-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 4px; }
.st-box { background: white; padding: 18px; border-radius: 20px; border: 1px solid var(--line); box-shadow: var(--sh); cursor: pointer; }
.st-box b { display: block; font-size: 1.2rem; font-weight: 900; margin-top: 4px; }
.st-box small { display: block; color: var(--muted); font-weight: 700; text-transform: uppercase; font-size: 0.6rem; }
.st-box span { display: block; font-size: .7rem; color: var(--muted); margin-top: 3px; }

/* Лічильники статусів */
.cnt-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 4px; }
.cnt { background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 14px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: .15s; box-shadow: var(--sh); }
.cnt:hover { box-shadow: var(--sh-lg); transform: translateY(-2px); }
.cnt:active { transform: scale(.97); }
.cnt .ic { width: 42px; height: 42px; border-radius: 12px; display: grid; place-items: center; font-size: 1.1rem; color: #fff; flex-shrink: 0; }
.cnt .num { font-size: 1.5rem; font-weight: 900; line-height: 1; letter-spacing: -.5px; }
.cnt .lbl { font-size: .62rem; color: var(--muted); font-weight: 700; text-transform: uppercase; margin-top: 3px; letter-spacing: .3px; }
.cnt .sum { font-size: .72rem; color: var(--txt); font-weight: 800; margin-top: 3px; }

.bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,.98); backdrop-filter: blur(10px); display: flex; border-top: 1px solid #ddd; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
.n-i { flex: 1; padding: 10px 5px; border: none; background: none; text-align: center; color: var(--muted2); font-size: .65rem; font-weight: 700; cursor: pointer; }
.n-i.active { color: var(--p2); }
.n-i i { display: block; font-size: 1.3rem; margin-bottom: 3px; }

.modal-w { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 2000; display: none; align-items: flex-end; justify-content: center; }
.modal-w[style*="flex"] .mbox { animation: slideUp .28s cubic-bezier(.2,.9,.3,1); }
@keyframes slideUp { from { transform: translateY(40px); opacity: .5; } to { transform: none; opacity: 1; } }
.mbox { background: #fff; width: 100%; max-width: 550px; border-radius: 22px 22px 0 0; padding: 25px; max-height: 95vh; overflow-y: auto; }
.mbox h3 { font-weight: 800; }
.fg { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
.grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
label { font-size: .65rem; font-weight: 800; color: var(--muted); text-transform: uppercase; }
input, select, textarea { padding: 12px; border: 1px solid var(--line); border-radius: 12px; font-size: 1rem; background: #f8fafc; width: 100%; font-family: inherit; transition: .15s; }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--p2); background: #fff; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }

.fab { position: fixed; right: 20px; bottom: 85px; width: 56px; height: 56px; border-radius: 18px; background: var(--p2); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; border: none; box-shadow: 0 8px 20px rgba(37,99,235,0.4); z-index: 1000; cursor: pointer; transition: .15s; }
.fab:active { transform: scale(.9) rotate(90deg); }
.btn-s { background: var(--p2); color: #fff; width: 100%; padding: 15px; border: none; border-radius: 15px; font-weight: 900; font-size: 1rem; cursor: pointer; margin-top: 4px; }

#loader { position: fixed; inset: 0; background: #fff; z-index: 5000; display: flex; justify-content: center; align-items: center; }

@media (min-width: 900px) {
  body { padding-left: var(--side-w); }
  .bottom-nav { top: 0; left: 0; width: var(--side-w); height: 100vh; flex-direction: column; padding: 30px 15px; border-right: 1px solid var(--line); border-top: none; background: white; }
  .n-i { flex: none; text-align: left; padding: 12px; font-size: .9rem; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
  .n-i i { margin: 0; font-size: 1.1rem; width: 24px; }
  .n-i.active { background: #eef2ff; }
  .cnt-grid { grid-template-columns: repeat(4, 1fr); }

  /* Модалка по центру + у 2 колонки */
  .modal-w { align-items: center; padding: 30px; }
  .mbox { border-radius: 22px; max-width: 720px; max-height: 90vh; }
  .modal-w[style*="flex"] .mbox { animation: popIn .22s cubic-bezier(.2,.9,.3,1); }
  @keyframes popIn { from { transform: scale(.96); opacity: .5; } to { transform: none; opacity: 1; } }
  .grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<div id="loader"><i class="fa fa-spinner fa-spin fa-2x" style="color:var(--p2)"></i></div>

<!-- ВХІД -->
<div id="authScreen">
  <div class="auth-box">
    <h2>ViknaPro CRM</h2>
    <div class="fg"><label>Email</label><input id="email" type="email" placeholder="mail@example.com"></div>
    <div class="fg"><label>Пароль</label><input id="password" type="password" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn-s" onclick="doLogin()">УВІЙТИ</button>
  </div>
</div>

<header>
  <div style="font-weight:900; letter-spacing: -0.5px;" id="brd">CRM</div>
  <button id="logoutBtn" onclick="doLogout()"><i class="fa fa-sign-out-alt"></i> Вихід</button>
</header>

<div class="nav-s" id="navS" style="display:none">
  <div class="s-t active" data-s="Усі" onclick="flt('Усі',this)">Усі</div>
  <div class="s-t" data-s="Боржники" onclick="flt('Боржники',this)">💸 Боржники</div>
  <div class="s-t" data-s="Кошторис" onclick="flt('Кошторис',this)">📑 Кошторис</div>
  <div class="s-t" data-s="Підтверджено" onclick="flt('Підтверджено',this)">✅ Підтверджено</div>
  <div class="s-t" data-s="Перевірка" onclick="flt('Перевірка',this)">🔎 Перевірка</div>
  <div class="s-t" data-s="В роботі" onclick="flt('В роботі',this)">🏭 В роботі</div>
  <div class="s-t" data-s="На складі" onclick="flt('На складі',this)">🚚 На складі</div>
  <div class="s-t" data-s="Виконано" onclick="flt('Виконано',this)">📦 Виконано</div>
  <div class="s-t" data-s="Скасовано" onclick="flt('Скасовано',this)">🚫 Скасовано</div>
</div>

<div class="container" id="mainUI" style="display:none">
  <div id="p-orders" class="panel on">
    <div style="display:flex; gap:10px; margin-bottom:15px;">
      <input type="text" id="q" placeholder="🔍 Пошук замовлення..." oninput="render()" style="flex:1">
      <select id="sortSel" onchange="render()" style="width:auto; padding:5px 10px; border-radius:10px; border:1px solid var(--line); font-weight:bold; color:var(--muted); font-size:0.7rem; background:white;">
        <option value="status">⇅ Статус</option>
        <option value="deadline">⇅ Дедлайн</option>
        <option value="new">⇅ Нові</option>
        <option value="price">⇅ Ціна</option>
      </select>
    </div>
    <div id="list"></div>
  </div>
  <div id="p-clients" class="panel">
    <input type="text" id="qc" placeholder="🔍 Пошук клієнта..." oninput="renderC()">
    <div id="listC" style="margin-top:15px"></div>
  </div>
  <div id="p-stats" class="panel"><div id="statsDisplay"></div></div>
</div>

<div class="bottom-nav" id="bottomNav" style="display:none">
  <button class="n-i active" id="ni-orders" onclick="tab('orders')"><i class="fa fa-list-ul"></i><span>Замовлення</span></button>
  <button class="n-i" id="ni-clients" onclick="tab('clients')"><i class="fa fa-users"></i><span>Клієнти</span></button>
  <button class="n-i" id="ni-stats" onclick="tab('stats')"><i class="fa fa-chart-line"></i><span>Звіт</span></button>
</div>

<button class="fab" id="fabBtn" style="display:none" onclick="fab()"><i class="fa fa-plus"></i></button>

<!-- МОДАЛКА ЗАМОВЛЕННЯ -->
<div id="mO" class="modal-w">
  <div class="mbox">
    <div style="display:flex;justify-content:space-between;margin-bottom:15px;"><h3>Замовлення</h3><i class="fa fa-times" onclick="closeM('mO')"></i></div>
    <div class="fg"><label>Клієнт</label><input id="fCl" list="dlC"><datalist id="dlC"></datalist></div>
    <div class="grid"><div class="fg"><label>Виріб</label><input id="fPr"></div><div class="fg"><label>Фабрика</label><select id="fFa"><option>Eko-okna</option><option>Seharia</option><option>Ukraine</option></select></div></div>
    <div class="grid"><div class="fg"><label>Статус</label><select id="fSt" onchange="tglCan()"><option>Кошторис</option><option>Підтверджено</option><option>Перевірка</option><option>В роботі</option><option>На складі</option><option>Виконано</option><option>Скасовано</option></select></div><div class="fg"><label>Дедлайн</label><input id="fDl" type="date"></div></div>
    <div id="canB" class="fg" style="display:none"><label style="color:red">Причина</label><textarea id="fCan"></textarea></div>
    <div class="grid"><div class="fg"><label>Ціна HT €</label><input id="fSa" type="number" oninput="calc()"></div><div class="fg"><label>Монтаж €</label><input id="fIn" type="number" oninput="calc()"></div></div>
    <div class="grid"><div class="fg"><label>TVA %</label><select id="fTv" onchange="calc()"></select></div><div class="fg"><label>Сума TTC €</label><input id="fTt" readonly style="background:#fefce8;font-weight:bold"></div></div>
    <div class="grid"><div class="fg"><label>Ціна Фабрики €</label><input id="fCo" type="number" oninput="calc()"></div><div class="fg"><label>Передплата ФАБРИЦІ €</label><input id="fFaPa" type="number"></div></div>
    <div class="grid"><div class="fg"><label>Передплата КЛІЄНТА €</label><input id="fPa" type="number"></div><div class="fg"><label>Чистий прибуток</label><input id="fMr" readonly style="background:#f0fdf4;font-weight:bold;color:#166534"></div></div>
    <div class="fg"><label>Етапи</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:0.75rem">
        <label><input type="checkbox" id="fChM"> 📐 Замір</label><label><input type="checkbox" id="fChO"> 🏭 Завод</label>
        <label><input type="checkbox" id="fChS"> 🚚 Склад</label><label><input type="checkbox" id="fChI"> 🏠 Монтаж</label>
      </div>
    </div>
    <div class="fg"><label>Передзвонити ⏰</label><input id="fRe" type="date"></div>
    <div class="fg"><label>Нотатки</label><textarea id="fNo" rows="2"></textarea></div>
    <button class="btn-s" onclick="saveO()">ЗБЕРЕГТИ</button>
    <button id="btnD" onclick="delO()" style="color:red;border:none;background:none;width:100%;margin-top:10px;font-weight:bold;cursor:pointer;display:none">Видалити</button>
  </div>
</div>

<!-- МОДАЛКА КЛІЄНТА -->
<div id="mC" class="modal-w">
  <div class="mbox">
    <div style="display:flex;justify-content:space-between;margin-bottom:15px;"><h3>Клієнт</h3><i class="fa fa-times" onclick="closeM('mC')"></i></div>
    <div class="fg"><label>ПІБ / Компанія</label><input id="cNa"></div>
    <div class="grid"><div class="fg"><label>Телефон</label><input id="cPh" type="tel"></div><div class="fg"><label>Адреса</label><input id="cAd"></div></div>
    <div class="fg"><label>Нотатки</label><textarea id="cNo"></textarea></div>
    <div id="hSec" style="margin-top:15px; border-top:1px solid #eee; padding-top:10px; display:none;"><label>Історія:</label><div id="hList"></div></div>
    <button class="btn-s" onclick="saveC()">ЗБЕРЕГТИ КЛІЄНТА</button>
    <button id="btnDC" onclick="delC()" style="color:red;border:none;background:none;width:100%;margin-top:10px;font-weight:bold;display:none">Видалити</button>
  </div>
</div>

<script>
const URL_SB = "https://ysctdrsxqtekxuvkjmdx.supabase.co";
const KEY_SB = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzY3RkcnN4cXRla3h1dmtqbWR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1ODkxOTksImV4cCI6MjA5OTE2NTE5OX0.vmOKBfc1dGLgrNu1YQ9IVF-v6nUGb2tzEK29L1X0aiQ";
const _sb = window.supabase.createClient(URL_SB, KEY_SB);

let co='heimek', orders=[], clients=[], editId=null, curT='orders', curS='Усі';
const TVA_OPTS = { heimek: [0, 5.5, 20], luxwin: [0, 6, 21] };
const n = v => parseFloat(v) || 0;
const fN = v => n(v).toLocaleString('uk-UA');

// АУТЕНТИФІКАЦІЯ
async function checkUser() {
  const { data: { session } } = await _sb.auth.getSession();
  if (session) {
    const { data: prof } = await _sb.from('profiles').select('company').eq('id', session.user.id).single();
    co = prof ? prof.company : 'heimek';
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('mainUI').style.display = 'block';
    document.getElementById('bottomNav').style.display = 'flex';
    document.getElementById('navS').style.display = 'flex';
    document.getElementById('fabBtn').style.display = 'flex';
    document.getElementById('logoutBtn').style.display = 'block';
    document.body.setAttribute('data-co', co);
    document.getElementById('brd').innerText = co.toUpperCase() + ' CRM';
    updateTva(); sync();
  } else {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('authScreen').style.display = 'flex';
  }
}

async function doLogin() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const { error } = await _sb.auth.signInWithPassword({ email, password });
  if (error) alert("Помилка: " + error.message); else checkUser();
}
async function doLogout() { await _sb.auth.signOut(); location.reload(); }

async function sync() {
  document.getElementById('loader').style.display = 'flex';
  const { data: oData } = await _sb.from('orders').select('*').eq('company', co).order('created_at', { ascending: false });
  orders = oData || [];
  const { data: cData } = await _sb.from('clients').select('*').eq('company', co);
  clients = cData || [];
  updateDl(); render(); if(curT==='stats') renderStats();
  document.getElementById('loader').style.display = 'none';
}

const render = () => {
  const q=document.getElementById('q').value.toLowerCase();
  const sort=document.getElementById('sortSel').value;
  const list=document.getElementById('list'); const today=new Date().toISOString().split('T')[0];
  let f = orders.filter(o=>( (o.client||"") + (o.product||"") + (o.factory||"") ).toLowerCase().includes(q));
  if (curS === 'Боржники') f = f.filter(o => (n(o.total_ttc) - n(o.paid_amount)) > 1 && o.status !== 'Виконано' && o.status !== 'Скасовано');
  else if(curS!=='Усі') f = f.filter(o => o.status === curS);

  const stPriority = { 'В роботі': 1, 'На складі': 2, 'Перевірка': 3, 'Підтверджено': 4, 'Кошторис': 5, 'Виконано': 6, 'Скасовано': 7 };
  if(sort === 'status') f.sort((a,b) => (stPriority[a.status] || 99) - (stPriority[b.status] || 99));
  else if(sort === 'deadline') f.sort((a,b) => (a.deadline || '9999').localeCompare(b.deadline || '9999'));
  else if(sort === 'new') f.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  else if(sort === 'price') f.sort((a,b) => n(b.total_ttc) - n(a.total_ttc));

  list.innerHTML = f.map(o=>{
    const ttc = n(o.total_ttc), paid = n(o.paid_amount), debt = ttc - paid;
    const over = o.deadline && o.deadline < today && o.status !== 'Виконано' && o.status !== 'Скасовано';
    const rem = o.reminder_date === today;
    const cl = clients.find(x=>x.name===o.client)||{};
    let stCl = o.status === 'Виконано' ? 'st-done' : o.status === 'Скасовано' ? 'st-cancelled' : o.status === 'В роботі' ? 'st-inwork' : o.status === 'На складі' ? 'st-storage' : o.status === 'Перевірка' ? 'st-verify' : '';
    let pLink = (cl.phone||"").startsWith('0') ? `+${co==='heimek'?'33':'32'}${cl.phone.substring(1)}` : cl.phone;

    return `<div class="card ${over?'over':''} ${rem?'rem':''} ${stCl}" onclick="openO('${o.id}')">
        <div class="c-row-1"><div class="c-name">${o.client||'Без імені'}</div><div class="status-badge">${o.status}</div></div>
        <div class="c-row-2">${o.factory} | ${o.product||'---'}</div>
        <div class="c-steps-inline">
          <i class="fa fa-ruler-combined ${o.check_measured?'active':''}"></i>
          <i class="fa fa-file-signature ${o.check_ordered?'active':''}"></i>
          <i class="fa fa-warehouse ${o.check_storage?'active':''}"></i>
          <i class="fa fa-tools ${o.check_installed?'active':''}"></i>
        </div>
        <div class="c-foot">
          <div class="val">${n(ttc).toFixed(0)}€</div>
          <div style="display:flex; align-items:center; gap:8px;">
            <a href="tel:${pLink}" onclick="event.stopPropagation()"><i class="fa fa-phone-alt" style="color:var(--success)"></i></a>
            <a href="https://wa.me/${(pLink||'').replace('+','')}" onclick="event.stopPropagation()"><i class="fab fa-whatsapp" style="color:#25d366"></i></a>
            <div class="debt-tag ${debt > 1 ? 'red' : 'green'}">${debt > 1 ? debt.toFixed(0)+'€' : 'OK'}</div>
          </div>
        </div>
      </div>`}).join('');
}

function renderStats() {
  const container = document.getElementById('statsDisplay');

  // Групи статусів
  const ACTIVE = ['Підтверджено','Перевірка','В роботі','На складі']; // "в роботі" (у процесі)
  const done   = orders.filter(o => o.status === 'Виконано');
  const active = orders.filter(o => ACTIVE.includes(o.status));
  const sold   = orders.filter(o => ACTIVE.includes(o.status) || o.status === 'Виконано');
  const sumTTC = a => a.reduce((s,o)=> s + n(o.total_ttc), 0);

  // Чистий прибуток — ТІЛЬКИ готове (Виконано)
  const profit  = done.reduce((s,o)=> s + (n(o.sale_price_ht)-n(o.cost_price)+n(o.install_cost)), 0);
  const doneRev = sumTTC(done);

  // Борг клієнтів — по проданих (в роботі + готово)
  const clientDebt  = sold.reduce((s,o)=> s + (n(o.total_ttc)-n(o.paid_amount)), 0);
  // Борг фабрикам — ТІЛЬКИ в роботі (готове не рахується)
  const factoryDebt = active.reduce((s,o)=> s + (n(o.cost_price)-n(o.factory_prepay)), 0);

  // Картки по статусах: кількість + сума
  const S = [
    {k:'Виконано', ic:'fa-box', c:'#16a34a'},
    {k:'В роботі', ic:'fa-gears', c:'#ed8936'},
    {k:'Перевірка', ic:'fa-magnifying-glass', c:'#0891b2'},
    {k:'На складі', ic:'fa-warehouse', c:'#7c3aed'},
    {k:'Підтверджено', ic:'fa-circle-check', c:'#2563eb'},
    {k:'Кошторис', ic:'fa-file-lines', c:'#64748b'},
    {k:'Скасовано', ic:'fa-ban', c:'#94a3b8'}
  ];
  let cHtml = S.map(s => {
    const g = orders.filter(o=>o.status===s.k);
    return `<div class="cnt" onclick="tab('orders'); flt('${s.k}', document.querySelector('[data-s=\\'${s.k}\\']'))"><div class="ic" style="background:${s.c}"><i class="fa ${s.ic}"></i></div><div><div class="num">${g.length}</div><div class="lbl">${s.k}</div><div class="sum">${fN(sumTTC(g))} €</div></div></div>`;
  }).join('');

  // Борг по фабриках — тільки в роботі
  let fHtml = '';
  ['Eko-okna', 'Seharia', 'Ukraine'].forEach(f => {
    const fo = active.filter(o => o.factory === f);
    const fd = fo.reduce((s, o) => s + (n(o.cost_price) - n(o.factory_prepay)), 0);
    fHtml += `<div class="st-box" style="border-left:4px solid var(--p2)"><b style="font-size:.95rem">${f}</b><small>${fo.length} в роботі</small><span>Борг: ${fN(fd)} €</span></div>`;
  });

  container.innerHTML = `
    <div class="st-main">
      <small>ЧИСТИЙ ПРИБУТОК · ГОТОВО</small>
      <h2 style="font-size:2.4rem">${fN(profit)} €</h2>
      <p>Виконано: ${done.length} замовл. · Обіг ${fN(doneRev)} €</p>
    </div>
    <div class="st-grid">
      <div class="st-box" style="border-left:4px solid var(--danger)"><b>${fN(clientDebt)} €</b><small>Борг клієнтів</small></div>
      <div class="st-box" style="border-left:4px solid var(--warning)"><b>${fN(factoryDebt)} €</b><small>Борг фабрикам (в роботі)</small></div>
    </div>
    <h4 class="st-h">Замовлення за статусами</h4>
    <div class="cnt-grid">${cHtml}</div>
    <h4 class="st-h">Борг по фабриках (в роботі)</h4>
    <div class="st-grid" style="grid-template-columns:repeat(3,1fr)">${fHtml}</div>`;
}

async function saveO() {
  const o = { id: editId || 'NEW'+Date.now(), company: co, client: document.getElementById('fCl').value, product: document.getElementById('fPr').value, factory: document.getElementById('fFa').value, status: document.getElementById('fSt').value, sale_price_ht: n(document.getElementById('fSa').value), tva_rate: n(document.getElementById('fTv').value), total_ttc: n(document.getElementById('fTt').value), cost_price: n(document.getElementById('fCo').value), install_cost: n(document.getElementById('fIn').value), paid_amount: n(document.getElementById('fPa').value), factory_prepay: n(document.getElementById('fFaPa').value), deadline: document.getElementById('fDl').value || null, reminder_date: document.getElementById('fRe').value || null, notes: document.getElementById('fNo').value, cancel_reason: document.getElementById('fCan').value, check_measured: document.getElementById('fChM').checked, check_ordered: document.getElementById('fChO').checked, check_storage: document.getElementById('fChS').checked, check_installed: document.getElementById('fChI').checked };
  await _sb.from('orders').upsert(o); closeM('mO'); sync();
}
async function saveC() { const c = { id: editId || 'CNEW'+Date.now(), company: co, name: document.getElementById('cNa').value, phone: document.getElementById('cPh').value, address: document.getElementById('cAd').value, notes: document.getElementById('cNo').value }; await _sb.from('clients').upsert(c); closeM('mC'); sync(); }
const openO = id => { editId=id; const o=id?orders.find(x=>x.id==id):{}; ['fCl','fPr','fSa','fCo','fIn','fPa','fDl','fRe','fNo','fCan','fFaPa'].forEach(i=>document.getElementById(i).value=''); ['fChM','fChO','fChS','fChI'].forEach(i=>document.getElementById(i).checked=false); if(id){ document.getElementById('fCl').value=o.client; document.getElementById('fPr').value=o.product; document.getElementById('fSa').value=o.sale_price_ht; document.getElementById('fTv').value=o.tva_rate; document.getElementById('fCo').value=o.cost_price; document.getElementById('fIn').value=o.install_cost; document.getElementById('fPa').value=o.paid_amount; document.getElementById('fDl').value=o.deadline; document.getElementById('fRe').value=o.reminder_date; document.getElementById('fSt').value=o.status; document.getElementById('fNo').value=o.notes; document.getElementById('fCan').value=o.cancel_reason; document.getElementById('fFaPa').value=o.factory_prepay; document.getElementById('fChM').checked=!!o.check_measured; document.getElementById('fChO').checked=!!o.check_ordered; document.getElementById('fChS').checked=!!o.check_storage; document.getElementById('fChI').checked=!!o.check_installed; document.getElementById('btnD').style.display='block'; } else document.getElementById('btnD').style.display='none'; tglCan(); calc(); document.getElementById('mO').style.display='flex'; }
const fab = () => curT === 'clients' ? (editId=null, ['cNa','cPh','cAd','cNo'].forEach(i=>document.getElementById(i).value=''), document.getElementById('hSec').style.display='none', document.getElementById('btnDC').style.display='none', document.getElementById('mC').style.display='flex') : openO(null);
const closeM = id => { document.getElementById(id).style.display='none'; editId=null; }
const tglCan = () => document.getElementById('canB').style.display = document.getElementById('fSt').value === 'Скасовано' ? 'block' : 'none';
const updateDl = () => { document.getElementById('dlC').innerHTML=clients.map(c=>`<option value="${c.name}">`).join(''); }
const flt = (s,el) => { curS=s; document.querySelectorAll('.s-t').forEach(t=>t.classList.remove('active')); if(el) el.classList.add('active'); else {const t = document.querySelector(`[data-s='${s}']`); if(t) t.classList.add('active');} render(); }
const tab = t => { curT=t; document.querySelectorAll('.panel').forEach(p=>p.style.display='none'); document.getElementById('p-'+t).style.display='block'; document.querySelectorAll('.n-i').forEach(i=>i.classList.remove('active')); document.getElementById('ni-'+t).classList.add('active'); if(t==='clients') renderC(); if(t==='stats') renderStats(); document.getElementById('navS').style.display = t === 'orders' ? 'flex' : 'none'; }
function renderC() { const q=document.getElementById('qc').value.toLowerCase(); document.getElementById('listC').innerHTML = clients.filter(c=>(c.name||'').toLowerCase().includes(q)).map(c=>`<div class="card" onclick="openCE('${c.id}')" style="border-left:none"><strong>${c.name||'Без імені'}</strong><br><small>${c.phone}</small></div>`).join(''); }
function openCE(id) { editId=id; const c=clients.find(x=>x.id==id); document.getElementById('cNa').value=c.name; document.getElementById('cPh').value=c.phone; document.getElementById('cAd').value=c.address; document.getElementById('cNo').value=c.notes; const h = orders.filter(o => o.client === c.name); document.getElementById('hSec').style.display = 'block'; document.getElementById('hList').innerHTML = h.map(o => `<div style="font-size:0.75rem; background:#f8fafc; padding:8px; border-radius:8px; margin-top:5px; display:flex; justify-content:space-between;" onclick="event.stopPropagation(); closeM('mC'); openO('${o.id}')"><span>${o.product}</span><b>${o.total_ttc} €</b></div>`).join('') || '<small>Замовлень немає</small>'; document.getElementById('btnDC').style.display='block'; document.getElementById('mC').style.display='flex'; }
async function delO() { if(confirm('Видалити?')) { await _sb.from('orders').delete().eq('id', editId); closeM('mO'); sync(); } }
async function delC() { if(confirm('Видалити?')) { await _sb.from('clients').delete().eq('id', editId); closeM('mC'); sync(); } }
const calc = () => { const h=n(document.getElementById('fSa').value), t=n(document.getElementById('fTv').value), c=n(document.getElementById('fCo').value), i=n(document.getElementById('fIn').value); document.getElementById('fTt').value = ((h+i)*(1+t/100)).toFixed(2); document.getElementById('fMr').value = ((h-c)+i).toFixed(2) + ' €'; }
function updateTva() { const sel = document.getElementById('fTv'); if(sel) sel.innerHTML = TVA_OPTS[co].map(v => `<option value="${v}">${v}%</option>`).join(''); }
function openSheet() { window.open("https://supabase.com/dashboard/project/ysctdrsxqtekxuvkjmdx/editor", "_blank"); }
window.onload = checkUser;
</script>
