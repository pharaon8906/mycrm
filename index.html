<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ViknaPro CRM Cloud</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root {
  --p: #1a3a5c; --p2: #2d6a9f; --a: #63b3ed; --bg: #f0f2f5;
  --success: #38a169; --danger: #e53e3e; --warning: #ed8936; --txt: #2d3748;
}
[data-co="luxwin"] { --p: #0f2d1a; --p2: #276749; --a: #68d391; }
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent;}
body { background: var(--bg); color: var(--txt); font-family: 'Segoe UI', sans-serif; padding-bottom: 70px; }
header{background:var(--p); color:#fff; padding:8px 12px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:1000;}
.btns{display:flex; background:rgba(0,0,0,0.2); padding:2px; border-radius:10px;}
.btn-c{border:none; background:none; color:#fff; opacity:0.5; padding:4px 10px; cursor:pointer; font-weight:bold; font-size:0.65rem;}
.btn-c.on{opacity:1; background:rgba(255,255,255,0.2); border-radius:8px;}
.nav-s{display:flex; gap:8px; overflow-x:auto; padding:8px 12px; background:#fff; border-bottom:1px solid #eee; position:sticky; top:41px; z-index:900; scrollbar-width:none;}
.s-t{padding:6px 12px; border-radius:15px; background:#f0f2f5; font-size:0.65rem; font-weight:bold; color:#718096; white-space:nowrap; border:1px solid #e2e8f0; cursor:pointer;}
.s-t.active{background:var(--p2); color:#fff; border-color:var(--p2);}
.container{padding:10px; max-width:600px; margin:0 auto;}
.panel{display:none;} .panel.on{display:block;}
.card { background: #fff; border-radius: 15px; padding: 12px 14px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; position: relative; overflow: hidden; }
.card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--p2); }
.c-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.c-name { font-size: 0.95rem; font-weight: 800; color: var(--p); flex: 1; }
.c-info { font-size: 0.75rem; color: #718096; margin-bottom: 8px; }
.c-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; padding-top: 8px; border-top: 1px dashed #edf2f7; }
.bottom-nav {position:fixed; bottom:0; width:100%; background:white; display:flex; border-top:1px solid #ddd; z-index:1000;}
.n-i {flex:1; padding:8px; border:none; background:none; text-align:center; color:#718096; font-size:0.55rem; font-weight:bold;}
.n-i.active {color:var(--p2);}
.n-i i {display:block; font-size:1.1rem; margin-bottom:2px;}
.modal-w{position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:2000; display:none; align-items:flex-end; justify-content:center;}
.mbox{background:#fff; width:100%; max-width:550px; border-radius:20px 20px 0 0; padding:20px; max-height:95vh; overflow-y:auto;}
.fab{position:fixed; right:15px; bottom:75px; width:50px; height:50px; border-radius:25px; background:var(--p2); color:#fff; display:flex; align-items:center; justify-content:center; font-size:1.2rem; border:none; box-shadow:0 4px 10px rgba(0,0,0,0.2); z-index:1000;}
#loader { position: fixed; inset: 0; background: white; z-index: 5000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
</style>
</head>
<body data-co="heimek">

<div id="loader"><i class="fa fa-spinner fa-spin fa-2x" style="color:var(--p2)"></i><p id="loadMsg" style="margin-top:10px; font-size:0.7rem; color:gray;">Завантаження...</p></div>

<header>
  <div style="font-weight:bold; font-size: 0.9rem;" id="brd">HEIMEK CRM</div>
  <div class="btns">
    <button class="btn-c on" id="b-hmk" onclick="setCo('heimek')">HMK</button>
    <button class="btn-c" id="b-lux" onclick="setCo('luxwin')">LUX</button>
  </div>
</header>

<div class="nav-s" id="navS">
  <div class="s-t active" onclick="flt('Усі',this)">Усі</div>
  <div class="s-t" onclick="flt('Боржники',this)">💸 Боржники</div>
  <div class="s-t" onclick="flt('Кошторис',this)">📑 Кошторис</div>
  <div class="s-t" onclick="flt('В роботі',this)">🏭 В роботі</div>
  <div class="s-t" onclick="flt('Виконано',this)">📦 Виконано</div>
</div>

<div class="container">
  <div id="p-orders" class="panel on">
    <input type="text" id="q" placeholder="🔍 Пошук..." oninput="render()" style="margin-bottom:10px;padding:10px;border-radius:10px;border:1px solid #e2e8f0;width:100%;font-size:0.8rem;">
    <div id="list"></div>
  </div>
  <div id="p-clients" class="panel">
    <div id="listC"></div>
  </div>
</div>

<div class="bottom-nav">
  <button class="n-i active" id="ni-orders" onclick="tab('orders')"><i class="fa fa-list"></i>Замовлення</button>
  <button class="n-i" id="ni-clients" onclick="tab('clients')"><i class="fa fa-users"></i>Клієнти</button>
</div>

<button class="fab" onclick="fab()"><i class="fa fa-plus"></i></button>

<div id="mO" class="modal-w"><div class="mbox"><h3 id="mTitle">Замовлення</h3><button onclick="closeM('mO')">Закрити</button></div></div>

<script>
// Дані Supabase
const SB_URL = "https://ysctdrsxqtekxuvkjmdx.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzY3RkcnN4cXRla3h1dmtqbWR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1ODkxOTksImV4cCI6MjA5OTE2NTE5OX0.vmOKBfc1dGLgrNu1YQ9IVF-v6nUGb2tzEK29L1X0aiQ";
const _sb = window.supabase.createClient(SB_URL, SB_KEY);

let co='heimek', orders=[], clients=[], curS='Усі';

async function sync() {
  document.getElementById('loader').style.display = 'flex';
  try {
    // 1. Спробуємо завантажити ВЗАГАЛІ ВСІ замовлення (без фільтру по компанії), щоб перевірити, чи вони там є
    const { data, error } = await _sb.from('orders').select('*');
    
    if (error) throw error;
    
    if (!data || data.length === 0) {
      document.getElementById('list').innerHTML = "<p style='color:red; padding:20px;'>БАЗА ПОРОЖНЯ! Міграція не відбулася або таблиця orders не має даних.</p>";
    } else {
      // Перевіряємо, чи є в базі замовлення для поточної компанії
      const companyOrders = data.filter(o => o.company === co);
      if (companyOrders.length === 0) {
         document.getElementById('list').innerHTML = `<p style='color:orange; padding:20px;'>Дані є (${data.length} рядків), але жоден не має company='${co}'. <br>Перший рядок у базі має компанію: '${data[0].company}'</p>`;
      }
      orders = companyOrders;
      render();
    }
  } catch (e) {
    document.getElementById('list').innerHTML = "<p style='color:red; padding:20px;'>ПОМИЛКА: " + e.message + "</p>";
  }
  document.getElementById('loader').style.display = 'none';
}

const render = () => {
  const list = document.getElementById('list');
  const today = new Date().toISOString().split('T')[0];
  let f = orders;
  if(curS!=='Усі') f = f.filter(o => o.status === curS);
  
  list.innerHTML = f.map(o => `
    <div class="card" onclick="alert('ID: '+o.id)">
      <div class="c-head"><strong>${o.client || 'Без імені'}</strong> <small>${o.status}</small></div>
      <div class="c-info">${o.product} | ${o.factory}</div>
      <div class="c-foot"><strong>${o.total_ttc} €</strong></div>
    </div>
  `).join('');
}

function setCo(k) { co=k; sync(); }
function flt(s, el) { curS=s; document.querySelectorAll('.s-t').forEach(t=>t.classList.remove('active')); el.classList.add('active'); render(); }
function tab(t) { sync(); }

window.onload = sync;
</script>
</body>
</html>
